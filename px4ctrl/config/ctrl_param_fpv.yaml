    # z:  0.000826856126

    x:  0.000446336280
    y:  0.000472599709
    z:  0.000534082621

ctrl_freq_max   : 333.0
ctrl_mode : 3
task_mode : 1
# 0: attitude
# 1: attitude with bodyrate feedforward
# 2: bodyrate
# 3: actuator

# Z_attach    :   0.0
Z_attach    :   -0.041
# FUpperLimit :   1.3
FUpperLimit :   20.0
# FLowerLimit :   0.5
FLowerLimit :   0.0

use_bodyrate_ctrl: false

max_manual_vel: 0.2
max_angle: 75  # Attitude angle limit in degree. A negative value means no limit.
low_voltage: 21.6 # 4S battery

rc_reverse: # *
    roll: false
    pitch: false
    yaw: false
    throttle: true

auto_takeoff_land:
    enable: true
    enable_auto_arm: true
    no_RC: false
    takeoff_height: 1.0 # m
    takeoff_land_speed: 0.3 # m/s

thrust_model: # The model that maps thrust signal u(0~1) to real thrust force F(Unit:N): F=K1*Voltage^K2*(K3*u^2+(1-K3)*u). 
    print_value: false # display the value of “thr_scale_compensate” or “hover_percentage” during thrust model estimating.
    accurate_thrust_model: false  # This can always enabled if don't require accurate control performance :-)
    # accurate thrust mapping parameters
    K1: 0.7583 # Needs precise calibration!
    K2: 1.6942 # Needs precise calibration!
    K3: 0.6786 # Needs precise calibration! K3 equals THR_MDL_FAC in https://docs.px4.io/master/en/config_mc/pid_tuning_guide_multicopter.html.
    # approximate thrust mapping parameters
    hover_percentage: 0.45  # Thrust percentage in Stabilize/Arco mode #
    
    # ytk ground effect
    # thrust_k    : 4.119353998069477e-09
    thrust_k    : 4.170353998069477e-09
    # torque_k    : 3.479070863623228e-11
    # torque_k    : 3.732784758873305e-11
    torque_k    : 2.967863055177127e-11
    # torque_z_comp   : -0.0009125
    torque_z_comp   : 0.0006125
    # torque_z_comp   : 0
    rpm_sp          : 40000
    # rpm_sp          : 0.3
    rpm_kp          : 0.6
    acc_sp          : 50 # rpm_ki = 1.0 / acc_sp
    win_size        : 5

    bat_inter_R: 0.051
    pwm_to_rpm2_b2: 150.434698506940
    pwm_to_rpm2_b1: 1332112.35849943
    pwm_to_rpm2_b0: -1589112351.26661
    pwm_to_rpm2_vol_pow: 0.0
    
    # 0
    # thrust_to_rpm2_p2: -5.188821703152657e+07
    # thrust_to_rpm2_p1: 8.240499311365697e+08
    # thrust_to_rpm2_p0: 6.661238787335551e+07

    # # 500
    # thrust_to_rpm2_p2: -6.475173912691230e+07
    # thrust_to_rpm2_p1: 8.564924917862918e+08
    # thrust_to_rpm2_p0: 7.563288273185177e+07

    # 1000
    thrust_to_rpm2_p2: -7.761526122229934e+07
    thrust_to_rpm2_p1: 8.889350524360121e+08
    thrust_to_rpm2_p0: 8.515337759034817e+07

    # # 1500
    # thrust_to_rpm2_p2: -9.047878331768680e+07
    # thrust_to_rpm2_p1: 9.213776130857283e+08
    # thrust_to_rpm2_p0: 9.517387244884446e+07


